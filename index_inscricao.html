<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_inscricao.css">
    <title>Inscreva-se</title>
</head>
<body>
    <header>
        <img src="imagens/logo.png" alt="logo">
        <h1>
            Venha fazer parte da T4english!
        </h1>
    </header>
    <div id="acessibilidade">
        <button id="modoContraste" aria-label="Alternar modo claro e escuro">
            🌙
        </button>
        <button id="aumentarFonte" aria-label="Aumentar tamanho da fonte">
            A+
        </button>
    </div>
    <form id="formulario_inscricao" action="enviar_inscricao">
        <div>
            <label for="nome">Nome completo *</label> <br>
            <input type="text"><br>
            <label for="celular">Celular *</label> <br>
            <input type="text"><br>
        </div>
        <div>
            <label for="dt_nascimento">Data de nascimento *</label> <br>
            <input type="date"><br>
            <label for="email">E-mail *</label> <br>
            <input type="text"><br>
        </div>
    </form>
    <button>Inicie sua jornada de aprendizagem!</button>
    <script src="acessibilidade.js"></script>
</body>
</html>
